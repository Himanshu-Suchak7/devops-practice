<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Practice - Modern Submission Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>DevOps Practice</h1>
        <p class="subtitle">Complete the form to submit your data to the backend.</p>
        
        <form id="submissionForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
            </div>
            <button type="submit" id="submitBtn">Submit Data</button>
        </form>

        <div id="status"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
